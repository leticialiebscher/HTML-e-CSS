<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Formulário com checkbox e radio buttons</h1>
    <fieldset>
        <legend>Gênero</legend>
        <input type="radio" name="sexo" id="isxma">
        <label for="isxma">Masculino</label>
        <input type="radio" name="sexo" id="isxfe">
        <label for="isxfe">Feminino</label>
        <input type="radio" name="sexo" id="isxna">
        <label for="isxna">Não informado</label>
    </fieldset>
    <fieldset>
        <legend>Esportes favoritos</legend>
        <input type="checkbox" name="ebas" id="iebas"> 
        <label for="iebas">Basquete</label>
        <input type="checkbox" name="efut" id="iefut"> 
        <label for="iefut">Futebol</label>
        <input type="checkbox" name="eten" id="ieten"> 
        <label for="ieten">Tênis</label>
        <input type="checkbox" name="evol" id="ievol"> 
        <label for="ievol">Vôlei</label>
        <input type="checkbox" name="erug" id="ierug"> 
        <label for="ierug">Rugby</label>
    </fieldset>
    <p>
        <input type="reset" value="limpar">
        <input type="submit" value="Enviar">
    </p>
</body>
</html>
